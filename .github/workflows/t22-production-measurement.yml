name: T22 production measurement (manual)

# Manual-only measurement for the REAL production deploy/docker-compose.yml.
# This emits a JSON artifact with timing/resource observations for the public
# SDK/rf object PUT/GET/ACK/TOMBSTONE path. It is explicitly not a production
# SLO gate: ubuntu-latest is a shared runner and the owner numeric threshold is
# not defined yet.
on:
  workflow_dispatch:
    inputs:
      object_count:
        description: Number of measured objects
        required: false
        default: "1"
      object_bytes:
        description: Bytes per measured object
        required: false
        default: "1048576"
      chunk_bytes:
        description: Object chunk size
        required: false
        default: "65536"

concurrency:
  group: t22-production-measurement-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  t22-prod-measurement:
    name: t22 production measurement artifact
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      # The test resolves the product deploy dir as <parent>/ramflux/deploy and
      # runs its bootstrap/issue-certs/build-prod-images scripts, so check out
      # product and itest as siblings.
      - name: Checkout ramflux (product, pinned)
        uses: actions/checkout@b9e0990d219a03df7633c93f6f005a8fecbcab22
        with:
          repository: ramfluxhq/ramflux
          ref: 04181b66e49bed8a9cf1da75b083d78c7cd0ccbf
          path: ramflux

      - name: Checkout ramflux-itest (this repo)
        uses: actions/checkout@b9e0990d219a03df7633c93f6f005a8fecbcab22
        with:
          ref: ${{ github.sha }}
          path: ramflux-itest

      - name: Cache
        uses: Swatinem/rust-cache@baf1a810e98b6a3001d0d7234864ed75a17c42fb
        with:
          # Both workspaces build: the product node binaries
          # (build-prod-images.sh) and the itest test binary.
          workspaces: |
            ramflux
            ramflux-itest

      - name: Run T22 production measurement
        working-directory: ramflux-itest
        env:
          RAMFLUX_T22_PRODUCTION_MEASURE: "1"
          RAMFLUX_T22_MEASURE_OBJECTS: ${{ inputs.object_count }}
          RAMFLUX_T22_MEASURE_OBJECT_BYTES: ${{ inputs.object_bytes }}
          RAMFLUX_T22_MEASURE_CHUNK_BYTES: ${{ inputs.chunk_bytes }}
        run: |
          cargo test --features realnet --no-default-features \
            t22_production_measure_public_sdk_object -- --nocapture --test-threads=1

      - name: Upload measurement artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: t22-production-measurement
          path: ramflux-itest/perf-artifacts/perf_t22_production_measure_*.json
          if-no-files-found: error
